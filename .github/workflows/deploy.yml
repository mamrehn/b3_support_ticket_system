name: Deploy to GitHub Pages

on:
  push:
    branches: [main]
  workflow_dispatch:

# Berechtigungen für das Deployment auf GitHub Pages.
permissions:
  contents: read
  pages: write
  id-token: write

# Nur ein Deployment gleichzeitig; laufende Builds nicht abbrechen.
concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7

      - uses: actions/setup-node@v6
        with:
          # Node 22 LTS (Node 20 ist seit April 2026 End-of-Life).
          node-version: 22
          cache: npm

      - run: npm ci

      - name: Build
        env:
          # anon-Key ist per Design öffentlich (README §3). Als Repo-Secrets hinterlegen.
          VITE_SUPABASE_URL: ${{ secrets.VITE_SUPABASE_URL }}
          VITE_SUPABASE_ANON_KEY: ${{ secrets.VITE_SUPABASE_ANON_KEY }}
        run: npm run build

      - uses: actions/configure-pages@v6

      - uses: actions/upload-pages-artifact@v5
        with:
          path: ./dist

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - id: deployment
        uses: actions/deploy-pages@v5
